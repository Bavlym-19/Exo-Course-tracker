name: DB Migration
on:
  push:
    branches: [ main, master ]

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g pnpm && pnpm install --no-frozen-lockfile
      - run: npx drizzle-kit push
      # السطر الجديد السحري اللي هيضيف لك كل الأكواد حالاً:
      - run: |
          node -e "
          const { mysql2 } = require('mysql2');
          const conn = require('mysql2').createConnection(process.env.DATABASE_URL);
          const students = [
            ['970', 'Jana Ahmed', 'student', 1],
            ['980', 'Ahmed Youssef', 'student', 1],
            ['960', 'Arwa Tawfiq', 'student', 1],
            ['950', 'Amen', 'student', 1],
            ['940', 'Maureen Atef', 'student', 1]
          ];
          students.forEach(s => {
            conn.query('INSERT INTO students (id, name, role, isActive) VALUES (?, ?, ?, ?) ON DUPLICATE KEY UPDATE name=name', s, (err) => {
              if (err) console.error(err);
              else console.log('Added student:', s[1]);
            });
          });
          setTimeout(() => conn.end(), 5000);
          "
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

